<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Корзина | SportShop</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f8;
    font-family:Arial;
}

/* NAVBAR */

.navbar{
    position:sticky;
    top:0;
    z-index:1000;
    padding:15px 0;
}

.nav-btn{
    min-width:120px;
    text-align:center;
    border-radius:10px;
    transition:0.3s;
}

.nav-btn:hover{
    transform:translateY(-2px);
}

/* BOX */

.box{
    max-width:800px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:16px;
    box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

/* ITEMS */

.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px;
    border-bottom:1px solid #eee;
    transition:0.3s;
}

.item:hover{
    background:#fafafa;
}

.remove-anim{
    transform:translateX(60px);
    opacity:0;
}

/* FORM */

.order-form{
    display:none;
    margin-top:20px;
    padding:20px;
    border:1px solid #ddd;
    border-radius:12px;
    background:#fafafa;
}

.card-fields{
    display:none;
    margin-top:10px;
}

/* TOTAL */

.total{
    font-size:24px;
    font-weight:bold;
}

/* EMPTY */

.empty{
    text-align:center;
    color:gray;
    padding:30px;
    font-size:18px;
}

</style>

</head>

<body>

<!-- NAV -->
<nav class="navbar navbar-dark bg-dark">
<div class="container d-flex justify-content-between align-items-center">

<a class="navbar-brand fw-bold fs-4" href="index.html">
SportShop
</a>

<div class="d-flex gap-2 flex-wrap">

<a class="btn btn-outline-light nav-btn" href="index.html">
Главная
</a>

<a class="btn btn-outline-light nav-btn" href="catalog.html">
Каталог
</a>

<a class="btn btn-outline-light nav-btn" href="about.html">
О нас
</a>

<a class="btn btn-warning nav-btn" href="cart.html">
🛒 Корзина
</a>

</div>

</div>
</nav>

<!-- CART -->
<div class="box">

<h2 class="mb-4">
🛒 Корзина
</h2>

<div id="cartItems"></div>

<hr>

<h4 class="total">
Итого:
<span id="total">0</span>
AZN
</h4>

<button class="btn btn-success mt-3" onclick="showForm()">
Оформить заказ
</button>

<!-- ORDER FORM -->
<div class="order-form" id="orderForm">

<h5>Доставка</h5>

<input class="form-control mb-2" id="name" placeholder="Имя">

<input class="form-control mb-2" id="phone" placeholder="Телефон">

<input class="form-control mb-2" id="address" placeholder="Адрес">

<h5 class="mt-3">Оплата</h5>

<select class="form-control mb-2" id="payment" onchange="toggleCard()">

<option value="cash">
Наличными
</option>

<option value="card">
Картой
</option>

</select>

<div class="card-fields" id="cardFields">

<input class="form-control mb-2" id="cardNumber" placeholder="Номер карты">

<input class="form-control mb-2" id="cardDate" placeholder="Срок (MM/YY)">

<input class="form-control mb-2" id="cardCvv" placeholder="CVV">

</div>

<button class="btn btn-primary mt-2" onclick="confirmOrder()">
Подтвердить заказ
</button>

</div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function render(){

    let list = document.getElementById("cartItems");

    list.innerHTML = "";

    let total = 0;

    if(cart.length === 0){

        list.innerHTML = `
        <div class="empty">
        Корзина пуста
        </div>
        `;

    } else {

        cart.forEach((item,i)=>{

            total += Number(item.price);

            list.innerHTML += `
            <div class="item" id="item-${i}">

            <div>
            <strong>${item.name}</strong>
            <br>
            ${item.price} AZN
            </div>

            <button class="btn btn-sm btn-danger"
            onclick="removeItem(${i})">
            ❌
            </button>

            </div>
            `;
        });
    }

    document.getElementById("total").innerText = total;
}

function removeItem(i){

    let el = document.getElementById("item-"+i);

    el.classList.add("remove-anim");

    setTimeout(()=>{

        cart.splice(i,1);

        localStorage.setItem("cart",JSON.stringify(cart));

        render();

    },300);
}

function showForm(){

    if(cart.length === 0){
        alert("Корзина пуста!");
        return;
    }

    document.getElementById("orderForm").style.display = "block";
}

function toggleCard(){

    let method = document.getElementById("payment").value;

    let card = document.getElementById("cardFields");

    card.style.display =
    (method === "card")
    ? "block"
    : "none";
}

function confirmOrder(){

    let name = document.getElementById("name").value;

    let phone = document.getElementById("phone").value;

    let address = document.getElementById("address").value;

    let payment = document.getElementById("payment").value;

    if(!name || !phone || !address){

        alert("Заполните данные доставки!");

        return;
    }

    if(payment === "card"){

        let num = document.getElementById("cardNumber").value;

        let date = document.getElementById("cardDate").value;

        let cvv = document.getElementById("cardCvv").value;

        if(!num || !date || !cvv){

            alert("Заполните данные карты!");

            return;
        }
    }

    alert("Заказ оформлен успешно!");

    localStorage.removeItem("cart");

    location.reload();
}

render();

</script>

</body>
</html>
